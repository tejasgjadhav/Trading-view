name: Daily Trading Signals

on:
  schedule:
    # Run at 9:00 AM ET Mon–Fri (14:00 UTC)
    - cron: '0 14 * * 1-5'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write  # Needed to commit trade log and reports

jobs:
  generate-signals:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate daily signals
        run: python main.py signals
        env:
          PYTHONUNBUFFERED: '1'
          TZ: 'America/New_York'

      - name: Commit signals and reports
        run: |
          git config user.name "Trading Bot"
          git config user.email "trading-bot@github.com"
          git add data/ results/ reports/ README.md
          git diff --staged --quiet || git commit -m "📊 Daily signals — $(date '+%Y-%m-%d')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload signal artifacts
        uses: actions/upload-artifact@v4
        with:
          name: daily-signals-${{ github.run_id }}
          path: |
            results/latest_signals.json
            reports/daily_report.md
            data/trade_log.json
          retention-days: 90
