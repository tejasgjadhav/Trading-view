name: Update Open Position P&L (Midday Check)

on:
  schedule:
    # Run at 1:00 PM IST Mon–Fri (1:00 PM IST = 07:30 UTC) — midday check
    - cron: '30 7 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-positions:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check positions and update fills
        run: |
          python - <<'EOF'
          import sys, os
          sys.path.insert(0, '.')
          from live.signal_generator import fetch_data, update_open_positions
          from tracking import TradeLogger
          from config import WATCHLIST, BACKTEST_PERIOD_YEARS

          logger = TradeLogger()
          open_tickers = logger.get_open_positions()

          if not open_tickers:
              print("[OK] No open positions to update.")
              sys.exit(0)

          data = fetch_data(open_tickers, period_years=1)
          update_open_positions(logger, data)

          # Update fills for recently opened positions
          import json
          with open('data/trade_log.json') as f:
              log = json.load(f)

          from datetime import date
          today = str(date.today())
          for call in log['calls']:
              if call['status'] == 'open' and call['date'] == today:
                  ticker = call['ticker']
                  if ticker in data:
                      fill_price = float(data[ticker].iloc[-1]['Open'])
                      logger.log_fill(ticker, fill_price, fill_type='entry')
                      print(f"[FILL] {ticker} filled at ${fill_price:.2f}")

          summary = logger.get_performance_summary()
          print(f"\n[SUMMARY] Win rate: {summary.get('win_rate_pct', 0)}% | "
                f"Avg return: {summary.get('avg_return_pct', 0):+.2f}%")
          EOF

      - name: Commit updated positions
        run: |
          git config user.name "Trading Bot"
          git config user.email "trading-bot@github.com"
          git add data/
          git diff --staged --quiet || git commit -m "🔄 Position update — $(date '+%Y-%m-%d %H:%M')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
