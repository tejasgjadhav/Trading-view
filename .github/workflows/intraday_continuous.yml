name: "AVCM Continuous Scan — 9:15 AM–3:15 PM IST"

on:
  schedule:
    # Every 5 min, 9:15 AM–3:15 PM IST = 3:45 UTC–9:45 UTC Mon–Fri
    # AVCM signal cutoff: 1:30 PM IST (engine handles internally, returns NO_TRADE after)
    # AVCM force-close: 3:10 PM IST — last scan at 3:15 PM IST (9:45 UTC)
    - cron: '45,50,55 3 * * 1-5'
    - cron: '*/5 4-9 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Run continuous signal scan
        run: python -m engine.agent --continuous
        env:
          PYTHONUNBUFFERED: '1'
          TZ: 'Asia/Kolkata'
          GITHUB_STEP_SUMMARY: ${{ github.step_summary }}
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}

      - name: Commit scan log and any new signal
        run: |
          git config user.name "Trading Bot"
          git config user.email "trading-bot@github.com"
          git add data/scan_log.json data/daily_calls.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "🔍 Scan — $(TZ=Asia/Kolkata date '+%d %b %Y %H:%M IST')"
          # Retry push up to 3 times in case of concurrent run conflict
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "Push attempt $i failed, retrying..."
            sleep 5
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
