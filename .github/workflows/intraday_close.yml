name: "3:15 PM — Record EOD P&L"

on:
  schedule:
    # 3:15 PM IST = 09:45 UTC  (Mon–Fri)
    # AVCM force-close fires at 3:10 PM — this runs 5 min later to capture final prices
    - cron: '45 9 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  record-pnl:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Record end-of-day P&L
        run: python live/intraday_close.py
        env:
          PYTHONUNBUFFERED: '1'
          TZ: 'Asia/Kolkata'

      - name: Commit P&L to repo
        run: |
          git config user.name "Trading Bot"
          git config user.email "trading-bot@github.com"
          git add data/daily_calls.json
          git diff --staged --quiet || git commit -m "💰 EOD P&L — $(TZ=Asia/Kolkata date '+%d %b %Y')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
