name: "9:45 AM — Intraday Signal"

on:
  # Disabled — replaced by intraday_continuous.yml (dynamic scan every 5 min)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  morning-signal:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Generate 9:45 AM intraday signal
        run: python -m engine.agent
        env:
          PYTHONUNBUFFERED: '1'
          TZ: 'Asia/Kolkata'
          GITHUB_STEP_SUMMARY: ${{ github.step_summary }}

      - name: Commit call to repo
        run: |
          git config user.name "Trading Bot"
          git config user.email "trading-bot@github.com"
          git add data/daily_calls.json
          git diff --staged --quiet || git commit -m "📊 Signal — $(TZ=Asia/Kolkata date '+%d %b %Y %H:%M IST')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
